<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPlateforme - Connexion & Inscription Réelle</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .toggle-text {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
        }

        .toggle-text span {
            color: var(--primary-color);
            cursor: pointer;
            font-weight: 600;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-box">
        <h2>Connexion</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="login-email">Adresse Email</label>
                <input type="email" id="login-email" required placeholder="exemple@univ.tg">
            </div>
            <div class="form-group">
                <label for="login-password">Mot de passe</label>
                <input type="password" id="login-password" required placeholder="••••••••">
            </div>
            <button type="submit">Se connecter</button>
        </form>
        <p class="toggle-text">Pas encore de compte ? <span onclick="toggleForms()">S'inscrire</span></p>
    </div>

    <div id="register-box" class="hidden">
        <h2>Inscription</h2>
        <form id="register-form">
            <div class="form-group">
                <label for="reg-name">Nom complet</label>
                <input type="text" id="reg-name" required placeholder="Votre nom">
            </div>
            <div class="form-group">
                <label for="reg-email">Adresse Email</label>
                <input type="email" id="reg-email" required placeholder="exemple@univ.tg">
            </div>
            <div class="form-group">
                <label for="reg-password">Mot de passe</label>
                <input type="password" id="reg-password" required placeholder="••••••••">
            </div>
            <button type="submit">Créer mon compte</button>
        </form>
        <p class="toggle-text">Déjà inscrit ? <span onclick="toggleForms()">Se connecter</span></p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // ⚠️ REMPLACE CETTE CONFIGURATION PAR LA TIENNE DEPUIS LA CONSOLE FIREBASE
    const firebaseConfig = {
        apiKey: "TON_API_KEY",
        authDomain: "TON_AUTH_DOMAIN",
        projectId: "TON_PROJECT_ID",
        storageBucket: "TON_STORAGE_BUCKET",
        messagingSenderId: "TON_MESSAGING_SENDER_ID",
        appId: "TON_APP_ID"
    };

    // Initialiser Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Fonction pour basculer les formulaires (rendue globale pour le bouton HTML)
    window.toggleForms = function() {
        document.getElementById('login-box').classList.toggle('hidden');
        document.getElementById('register-box').classList.toggle('hidden');
    }

    // INSCRIPTION RÉELLE
    document.getElementById('register-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;

        createUserWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                alert("Compte créé avec succès ! Tu es maintenant connecté.");
                console.log(userCredential.user);
            })
            .catch((error) => {
                alert("Erreur d'inscription : " + error.message);
            });
    });

    // CONNEXION RÉELLE
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        signInWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                alert("Connexion réussie ! Bienvenue.");
                // C'est ici qu'on redirigera vers la page des notes ou des cours plus tard
            })
            .catch((error) => {
                alert("Erreur de connexion : " + error.message);
            });
    });
</script>

</body>
</html>
